# Streamlit 配置文件
# 文档: https://docs.streamlit.io/library/api-reference/configuration/config.toml

[browser]
# 是否收集使用统计信息 (修正为驼峰命名)
gatherUsageStats = false

[server]
# 启动端口
port = 8501
# 启用CORS (修正为驼峰命名)
enableCORS = true
# 最大上传文件大小 (MB)
maxUploadSize = 200

[theme]
# 自定义主题
primaryColor = "#27ae60"
secondaryBackgroundColor = "#ecf0f1"
textColor = "#2c3e50"
font = "sans serif"

[client]
# 客户端配置
showErrorDetails = true
toolbarMode = "minimal"

[runner]
# 运行器配置
magicEnabled = true
fastReruns = true