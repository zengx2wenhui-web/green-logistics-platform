# Streamlit 配置文件
# 文档: https://docs.streamlit.io/library/api-reference/configuration/config.toml

[general]
# 应用名称（显示在浏览器标签）
app_name = "赛事碳足迹优化平台"
# 电子邮件地址（可选）
email = "support@example.com"

[browser]
# 不自动打开浏览器（服务器模式）
gather_usage_stats = true

[server]
# 启动端口
port = 8501
# 启用CORS（如果需要从其他域名访问）
enable_cors = false
# 启用WebSocket压缩
websocket_compression = "auto"

[theme]
# 自定义主题
primaryColor = "#27ae60"
secondaryBackgroundColor = "#ecf0f1"
textColor = "#2c3e50"
font = "sans serif"

[client]
# 客户端配置
showErrorDetails = true
toolbarMode = "minimal"

[runner]
# 运行器配置
magicEnabled = true
fastReruns = true
maxCachedMessageAge = 2

[mapplot]
# 地图配置
mapboxToken = ""  # 如需使用Mapbox，填入Token

[server]
# 最大上传文件大小 (MB)
maxUploadSize = 200
